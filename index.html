<!DOCTYPE html>

<html lang="zh">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pi Word Match Hero</title>

    <!-- Pi SDK -->

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <!-- 字体 -->

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <h1>🔤 Pi Word Match Hero</h1>

    <div class="top-bar">

        <span>⚡ XP: <b id="xpVal">0</b></span>

        <span>🔥 Combo: <b id="comboVal">0</b></span>

        <span>🏆 关卡: <b id="lvlVal">1</b></span>

    </div>

</header>

<!-- 游戏提示 -->

<div class="game-panel">

    <div id="levelTitle"></div>

</div>

<!-- 状态卡 -->

<div id="status-card" style="

    max-width:420px;margin:14px auto;

    background:#131620;border:1px solid #1e2235;border-radius:12px;

    padding:14px 18px;display:flex;align-items:center;gap:10px;">

    <div class="spinner" id="status-icon"></div>

    <span id="status-text" style="font-size:13px;">初始化中（可跳过登录进入游戏）</span>

</div>

<!-- 登录按钮（可选） -->

<div style="text-align:center;margin-bottom:8px;">

    <button id="signin-btn" style="

        display:inline-block;

        background:linear-gradient(135deg,#ffb300,#c88a00);

        color:#0a0c12;font-family:'Orbitron';

        font-size:13px;font-weight:700;

        border:none;border-radius:30px;

        padding:12px 28px;cursor:pointer;"

        onclick="handleSignIn()">

        使用 Pi 登录（可选）

    </button>

    <!-- ⭐ 新增：直接进入游戏 -->

    <button onclick="startGameDirect()" style="

        margin-left:10px;

        background:#2d7dff;color:white;

        border:none;border-radius:30px;

        padding:12px 18px;cursor:pointer;">

        直接进入游戏

    </button>

</div>

<!-- 用户卡 -->

<div id="user-card" style="

    display:none;flex-direction:column;gap:12px;

    max-width:420px;margin:0 auto 12px;padding:18px;

    background:#131620;border:1px solid #1e2235;border-radius:12px;text-align:center;">

    

    <div style="display:flex;align-items:center;gap:12px;justify-content:center;">

        <div id="user-avatar" style="

            width:44px;height:44px;border-radius:50%;

            background:linear-gradient(135deg,#ffb300,#c88a00);

            display:flex;align-items:center;justify-content:center;

            font-family:'Orbitron';font-size:20px;font-weight:900;color:#0a0c12;">

            π

        </div>

        <div>

            <div id="user-name" style="font-family:'Orbitron';font-size:15px;color:#ffb300;">游客</div>

            <div style="font-size:11px;color:#5a6080;">可试玩模式</div>

        </div>

    </div>

    <button id="startBtn" onclick="startGame()">🚀 开始游戏</button>

</div>

<!-- 棋盘 -->

<div id="board"></div>

<!-- 结果弹窗 -->

<div id="resultModal" class="hidden">

    <div class="result-box">

        <h2 id="resultTitle">🎉 过关！</h2>

        <p>本局累计</p>

        <div class="xp-badge">+<span id="resultXP">0</span> XP</div>

        <button id="nextBtn">下一关 →</button>

    </div>

</div>

<script src="words.js"></script>

<script src="game.js"></script>

<script>

"use strict";

let currentUser = null;

let accessToken = null;

let piInitialized = false;

/* ================= UI ================= */

function setStatus(msg, type = 'loading') {

    const card = document.getElementById('status-card');

    const icon = document.getElementById('status-icon');

    const text = document.getElementById('status-text');

    text.textContent = msg;

    card.style.borderColor =

        type === 'success' ? '#4caf50' :

        type === 'error' ? '#f44336' : '#1e2235';

    if (type === 'loading') {

        icon.className = 'spinner';

    } else {

        icon.className = '';

        icon.style.cssText =

            `width:10px;height:10px;border-radius:50%;

             background:${type === 'success' ? '#4caf50' : '#f44336'}`;

    }

}

function showUser(user) {

    document.getElementById('user-card').style.display = 'flex';

    document.getElementById('user-name').textContent = user?.username || "游客";

    document.getElementById('user-avatar').textContent =

        user?.username ? user.username.charAt(0).toUpperCase() : "T";

}

/* ================= Pi SDK ================= */

async function initPi() {

    if (piInitialized) return;

    await new Promise((resolve) => {

        if (window.Pi) return resolve();

        const timer = setInterval(() => {

            if (window.Pi) {

                clearInterval(timer);

                resolve();

            }

        }, 100);

    });

    try {

        await window.Pi.init({ version: "1.5", sandbox: false });

    } catch (e) {

        console.warn("Pi init失败，但允许继续游戏");

    }

    piInitialized = true;

}

/* ================= 登录 ================= */

async function authenticate() {

    try {

        setStatus("连接 Pi（可跳过）...", "loading");

        await initPi();

        if (!window.Pi) throw new Error("Pi SDK 不可用");

        const auth = await window.Pi.authenticate(['username'], () => {});

        currentUser = auth.user;

        accessToken = auth.accessToken;

        setStatus("登录成功", "success");

        showUser(currentUser);

        // ⭐ 改动1：登录成功不强制等待 → 自动进游戏

        startGame();

    } catch (err) {

        console.warn(err);

        setStatus("未登录，进入试玩模式", "error");

        // ⭐ 改动2：失败也能进游戏

        currentUser = null;

        showUser(null);

        startGame();

    }

}

/* ================= 游戏入口 ================= */

function startGame() {

    const board = document.getElementById("board");

    if (board) board.style.display = "block";

    if (typeof initGame === "function") {

        initGame();

    }

    setStatus("游戏进行中", "success");

}

/* ⭐ 新增：强制直接进入（不走Pi） */

function startGameDirect() {

    setStatus("直接进入游戏模式", "success");

    currentUser = { username: "Guest" };

    showUser(null);

    startGame();

}

/* ================= 登录按钮 ================= */

async function handleSignIn() {

    await authenticate();

}

/* ⭐ 改动3：不再强制自动登录 */

window.addEventListener('load', () => {

    setTimeout(() => {

        setStatus("可选择登录或直接进入游戏", "success");

    }, 600);

});

</script>

<style>

.spinner {

    width: 14px;height: 14px;

    border: 2px solid rgba(255,179,0,.2);

    border-top-color: #ffb300;

    border-radius: 50%;

    animation: spin .7s linear infinite;

}

@keyframes spin { to { transform: rotate(360deg); } }

</style>

</body>

</html>
