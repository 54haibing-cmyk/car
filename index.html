<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英语连连看 - 交通工具</title>
    <style>
        :root {
            --primary: #4a6cf7;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 10px 15px;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .info {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 15px;
            max-width: 100%;
            flex: 1;
        }
        .card {
            aspect-ratio: 1/1.1;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .card.back {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card-content {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }
        .card.front {
            transform: rotateY(180deg);
            background: white;
            color: #1e3a8a;
        }
        .card img {
            width: 65%;
            height: 65%;
            object-fit: contain;
        }
        .card .word {
            margin-top: 8px;
            font-size: 13px;
            font-weight: bold;
        }
        .controls {
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            background: rgba(0,0,0,0.3);
        }
        button {
            padding: 10px 20px;
            background: white;
            color: #1e3a8a;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
        }
        .win-modal {
            background: white;
            color: #1e3a8a;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
        }
    </style>
</head>
<body>
    <header>
        <div>← 第1关 交通工具</div>
        <div class="info">
            <div>时间: <span id="timer">00:00</span></div>
            <div>连击: <span id="combo">0</span></div>
            <div>XP: <span id="xp">0</span></div>
        </div>
        <div>⭐ 0</div>
    </header>

    <div class="card-grid" id="grid"></div>

    <div class="controls">
        <button onclick="hint()">💡 提示 (3)</button>
        <button onclick="shuffleCards()">🔄 重排</button>
        <button onclick="peek()">🔍 查看 (3)</button>
    </div>

    <div id="winModal" class="modal">
        <div class="win-modal">
            <h2>🎉 恭喜通关！</h2>
            <p>你学会了 20 个交通工具单词！</p>
            <button onclick="restartGame()" style="margin-top:20px;">下一关 →</button>
        </div>
    </div>

    <script>
        // 20个交通工具词汇（图片使用Emoji + 描述，便于测试，后续替换真实图片）
        const vocabulary = [
            { word: "car", emoji: "🚗", cn: "汽车" },
            { word: "bus", emoji: "🚌", cn: "公交车" },
            { word: "bicycle", emoji: "🚲", cn: "自行车" },
            { word: "airplane", emoji: "✈️", cn: "飞机" },
            { word: "train", emoji: "🚄", cn: "火车" },
            { word: "taxi", emoji: "🚕", cn: "出租车" },
            { word: "helicopter", emoji: "🚁", cn: "直升机" },
            { word: "motorcycle", emoji: "🏍️", cn: "摩托车" },
            { word: "truck", emoji: "🚚", cn: "卡车" },
            { word: "ship", emoji: "🚢", cn: "轮船" },
            { word: "boat", emoji: "⛵", cn: "小船" },
            { word: "ambulance", emoji: "🚑", cn: "救护车" },
            { word: "firetruck", emoji: "🚒", cn: "消防车" },
            { word: "policecar", emoji: "🚓", cn: "警车" },
            { word: "scooter", emoji: "🛵", cn: "滑板车" },
            { word: "tractor", emoji: "🚜", cn: "拖拉机" },
            { word: "subway", emoji: "🚇", cn: "地铁" },
            { word: "rocket", emoji: "🚀", cn: "火箭" },
            { word: "van", emoji: "🚐", cn: "面包车" },
            { word: "schoolbus", emoji: "🚌", cn: "校车" }
        ];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let combo = 0;
        let xp = 0;
        let seconds = 0;
        let timerInterval;
        let isLocked = false;

        function createCards() {
            cards = [];
            vocabulary.forEach(item => {
                // 每词创建两张卡片：一张图片，一张单词
                cards.push({ type: 'image', word: item.word, content: item.emoji, id: item.word });
                cards.push({ type: 'word', word: item.word, content: item.word.toUpperCase(), id: item.word });
            });
            // 洗牌
            cards.sort(() => Math.random() - 0.5);
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card back';
                cardEl.dataset.index = index;
                cardEl.innerHTML = `
                    <div class="card-inner">
                        <div class="card-content" style="background: white; color: #1e3a8a; font-size: 28px; font-weight: bold;">
                            ${card.type === 'image' ? card.content : card.content}
                            <div class="word" style="font-size:12px;margin-top:5px;">${card.type === 'image' ? card.word : ''}</div>
                        </div>
                    </div>
                `;
                cardEl.addEventListener('click', () => flipCard(index, cardEl));
                grid.appendChild(cardEl);
            });
        }

        function flipCard(index, cardEl) {
            if (isLocked || flippedCards.length >= 2 || cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;

            cardEl.classList.add('flipped');
            flippedCards.push({ index, el: cardEl, card: cards[index] });

            if (flippedCards.length === 2) {
                isLocked = true;
                checkMatch();
            }
        }

        function checkMatch() {
            const [first, second] = flippedCards;
            if (first.card.id === second.card.id && first.card.type !== second.card.type) {
                // 匹配成功
                first.el.classList.add('matched');
                second.el.classList.add('matched');
                matchedPairs++;
                combo++;
                xp += 10 * combo;

                document.getElementById('combo').textContent = combo;
                document.getElementById('xp').textContent = xp;

                // 播放发音（占位）
                playWord(first.card.word);

                if (matchedPairs === vocabulary.length) {
                    setTimeout(winGame, 600);
                } else {
                    flippedCards = [];
                    isLocked = false;
                }
            } else {
                // 不匹配
                combo = 0;
                document.getElementById('combo').textContent = combo;
                setTimeout(() => {
                    first.el.classList.remove('flipped');
                    second.el.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 1200);
            }
        }

        function playWord(word) {
            // 占位：未来替换为真实音频
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                speechSynthesis.speak(utterance);
            } else {
                console.log('发音:', word);
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${m}:${s}`;
            }, 1000);
        }

        function winGame() {
            clearInterval(timerInterval);
            document.getElementById('winModal').style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('winModal').style.display = 'none';
            matchedPairs = 0;
            combo = 0;
            xp = 0;
            document.getElementById('combo').textContent = 0;
            document.getElementById('xp').textContent = 0;
            createCards();
            renderGrid();
            startTimer();
        }

        function hint() {
            alert('💡 提示：寻找图片和对应英文单词的匹配！');
        }

        function peek() {
            alert('🔍 查看功能（开发中）：短暂显示所有卡片');
        }

        function shuffleCards() {
            createCards();
            renderGrid();
        }

        // 初始化
        window.onload = function() {
            createCards();
            renderGrid();
            startTimer();
        };
    </script>
</body>
</html>
