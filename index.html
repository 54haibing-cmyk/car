<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Network 游戏</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #111; 
            color: #fff;
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            margin: 10px; 
            background: #4a90e2; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
        }
        #status { margin: 15px; padding: 12px; background: #222; border-radius: 6px; }
        #game-container { margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Pi Network 游戏</h1>
    <div id="status">正在初始化 Pi SDK...</div>
    <button id="signin-btn" style="display: none;">使用 Pi 登录</button>
    
    <div id="game-container" style="display: none;">
        <button id="start-btn">开始游戏</button>
        <div id="user-info"></div>
    </div>

    <script>
        let currentUser = null;
        let accessToken = null;
        let PiUser = null;

        // === 你的 Pi User 监听逻辑 ===
        window.addEventListener("PI_USER_READY", (e) => {
            PiUser = e.detail;
            console.log("PI_USER_READY received:", PiUser);
        });

        window.__PI_USER__ = window.__PI_USER__ || null;

        function getUser() {
            return PiUser || window.__PI_USER__ || currentUser;
        }

        // === Pi 初始化 & 认证（严格按要求）===
        async function initPi() {
            return new Promise((resolve, reject) => {
                if (typeof window.Pi === 'undefined') {
                    setTimeout(() => {
                        if (typeof window.Pi === 'undefined') reject(new Error('Pi SDK 未加载'));
                        else resolve();
                    }, 800);
                    return;
                }
                window.Pi.init({ version: "2.0" }).then(resolve).catch(reject);
            });
        }

        async function authenticateWithPi() {
            const statusEl = document.getElementById('status');
            try {
                statusEl.textContent = '正在请求 Pi 认证...';
                await initPi();

                const auth = await window.Pi.authenticate(["username"], (payment) => {
                    console.warn("Incomplete payment found:", payment);
                });

                accessToken = auth.accessToken;
                currentUser = auth.user;

                // 发送到后端验证
                const response = await fetch('/api/auth/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accessToken })
                });

                const result = await response.json();

                if (result.success) {
                    // 触发你的事件
                    window.dispatchEvent(new CustomEvent("PI_USER_READY", { 
                        detail: currentUser 
                    }));
                    window.__PI_USER__ = currentUser;

                    document.getElementById('game-container').style.display = 'block';
                    updateUI();
                }
            } catch (error) {
                console.error(error);
                statusEl.textContent = '认证失败或取消，请重试';
            }
        }

        function updateUI() {
            const user = getUser();
            if (user) {
                document.getElementById('status').innerHTML = `✅ 已登录：${user.username}`;
                document.getElementById('user-info').innerHTML = `
                    <p>用户名: ${user.username}</p>
                `;
            }
        }

        // === 你的 startGame（已删除登录限制）===
        let startBtn, currentLevel = 0, xp = 0, combo = 0;

        function startGame() {
            // ❌ 删除所有登录限制（已移除）
            startBtn.style.display = "none";
            currentLevel = 0;
            xp = 0;
            combo = 0;

            // 这里放你的游戏逻辑
            updateUI();
            loadLevel(currentLevel);   // 你需要自行实现 loadLevel
            console.log("游戏开始！当前用户:", getUser());
        }

        // 页面加载
        window.onload = async () => {
            startBtn = document.getElementById('start-btn');
            const signinBtn = document.getElementById('signin-btn');

            signinBtn.style.display = 'inline-block';
            signinBtn.addEventListener('click', authenticateWithPi);
            startBtn.addEventListener('click', startGame);

            // 自动认证
            try {
                await authenticateWithPi();
            } catch (e) {
                document.getElementById('status').textContent = '请点击“使用 Pi 登录”开始';
            }
        };

        // 占位：你需要实现的游戏函数
        function loadLevel(level) {
            console.log(`加载关卡 ${level}`);
            // 你的游戏主逻辑...
        }
    </script>
</body>
</html>
