<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
let PiUser = null;
let accessToken = null;
let piReady = false;

const status = document.getElementById("piStatus");
const btn = document.getElementById("piLoginBtn");

async function initPi(){
    try{
        await Pi.init({version:"2.0"});
        piReady = true;
        status.innerText = "Pi: Ready (Optional)";
        autoLogin();
    }catch(e){
        status.innerText = "Pi: Offline Mode";
    }
}

async function loginPi(){
    if(!piReady) return;

    try{
        const auth = await Pi.authenticate(["username"]);
        accessToken = auth.accessToken;

        const res = await fetch("/api/auth/verify",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({accessToken})
        });

        const data = await res.json();

        if(data.ok){
            PiUser = data.user;
            window.__PI_USER__ = PiUser;

            status.innerText = "Pi: " + PiUser.username;
            btn.style.display = "none";
        }

    }catch(e){
        console.log("Pi login skipped");
        status.innerText = "Pi: Offline Mode";
    }
}

async function autoLogin(){
    try{ await loginPi(); }catch(e){}
}

btn.onclick = loginPi;

window.addEventListener("load", initPi);
</script>
