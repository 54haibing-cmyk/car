<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Word Match Hero</title>

<meta name="description"
content="Match pictures with words, learn English, hear pronunciation, and unlock fun levels!">

<meta name="theme-color"
content="#24104a">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- 星空背景 -->
<div id="stars"></div>

<header>

<h1>
🌟 WORD MATCH HERO 🌟
</h1>

<div class="top-bar">

<div>
Level:
<span id="level">1</span>
</div>

<div>
XP:
<span id="xp">0</span>
</div>

<div>
Combo:
<span id="combo">0</span>
</div>

</div>

</header>

<section class="game-panel">

<button id="startBtn">
🚀 START GAME
</button>

<div id="levelTitle">
Animal Kingdom
</div>

</section>

<!-- 游戏区域 -->
<div id="board"></div>

<!-- 通关弹窗 -->
<div id="resultModal"
class="hidden">

<div class="result-box">

<h2>
🎉 LEVEL COMPLETE!
</h2>

<p>
XP Earned:
<span id="finalXp">0</span>
</p>

<button id="nextBtn">
NEXT LEVEL
</button>

</div>

</div>

<!-- 配对成功 -->
<audio id="successSound">
<source
src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"
type="audio/mpeg">
</audio>

<!-- 配对失败 -->
<audio id="failSound">
<source
src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"
type="audio/mpeg">
</audio>

<!-- Pi SDK（以后5.0启用） -->
<!--
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
-->

<script src="words.js"></script>
<script src="game.js"></script>

</body>

</html>
